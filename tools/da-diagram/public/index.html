<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>da-diagram</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
<!-- cytoscape-dagre: loaded inline below since cdnjs doesn't host it -->
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
  font-size: 12px;
  background: #0d1117;
  color: #c9d1d9;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Toolbar ── */
#toolbar {
  height: 38px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  flex-shrink: 0;
  font-size: 11px;
}
#toolbar .title { color: #58a6ff; font-weight: 700; font-size: 13px; margin-right: 4px; }
#toolbar select, #toolbar .chip {
  background: #21262d; border: 1px solid #30363d; color: #c9d1d9;
  border-radius: 4px; padding: 3px 8px; font-family: inherit; font-size: 11px;
  cursor: pointer;
}
#toolbar select:focus { outline: none; border-color: #58a6ff; }
#toolbar .spacer { flex: 1; }
#toolbar .status { color: #6e7681; font-size: 10px; }
.btn {
  background: #21262d; border: 1px solid #30363d; color: #c9d1d9;
  border-radius: 5px; padding: 4px 10px; font-family: inherit; font-size: 11px;
  cursor: pointer; white-space: nowrap;
}
.btn:hover { border-color: #58a6ff; color: #58a6ff; }
.btn.primary { background: #1f6feb; border-color: #1f6feb; color: white; }
.btn.primary:hover { background: #388bfd; }
.btn.danger  { background: #6e2020; border-color: #f85149; color: #ff7b72; }
.btn.green   { background: #1a3a22; border-color: #3fb950; color: #56d364; }

/* ── Layout ── */
#layout {
  flex: 1;
  display: flex;
  min-height: 0;
}

/* ── Sidebars ── */
.sidebar {
  width: 230px;
  min-width: 180px;
  max-width: 320px;
  background: #161b22;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}
.sidebar.left  { border-right: 1px solid #30363d; resize: horizontal; }
.sidebar.right { border-left:  1px solid #30363d; width: 260px; }

.tab-bar { display: flex; border-bottom: 1px solid #21262d; flex-shrink: 0; }
.tab {
  padding: 7px 10px; font-size: 10px; cursor: pointer;
  color: #6e7681; border-bottom: 2px solid transparent;
  user-select: none;
}
.tab:hover { color: #c9d1d9; }
.tab.active { color: #c9d1d9; border-bottom-color: #58a6ff; }

.panel { display: none; flex: 1; flex-direction: column; overflow: hidden; min-height: 0; }
.panel.active { display: flex; }
.panel-body { flex: 1; overflow-y: auto; padding: 8px; }
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

.section-label {
  font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em;
  color: #484f58; margin: 8px 0 4px; font-weight: 600;
}

/* ── ADR items ── */
.adr-card {
  border: 1px solid #21262d; border-radius: 6px; padding: 8px;
  margin-bottom: 6px; cursor: pointer; transition: border-color 0.15s;
  position: relative;
}
.adr-card:hover { border-color: #388bfd55; }
.adr-card.highlighted { border-color: #f0883e; background: #f0883e0a; }
.adr-card.disabled-adr { opacity: 0.45; }
.adr-id { font-size: 9px; color: #6e7681; margin-bottom: 2px; }
.adr-title { font-size: 11px; color: #c9d1d9; }
.adr-gates { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 3px; }
.tag {
  font-size: 9px; background: #0d2137; border: 1px solid #1f6feb33;
  border-radius: 3px; padding: 1px 5px; color: #79c0ff;
}
.toggle {
  position: absolute; top: 8px; right: 8px;
  width: 28px; height: 16px; border-radius: 8px;
  background: #1f6feb; cursor: pointer; flex-shrink: 0;
  transition: background 0.2s;
}
.toggle::after {
  content: ''; position: absolute;
  width: 12px; height: 12px; background: white;
  border-radius: 50%; top: 2px; right: 2px; transition: right 0.2s;
}
.toggle.off { background: #30363d; }
.toggle.off::after { right: auto; left: 2px; }

/* ── Kata requirements ── */
.req-item {
  display: flex; align-items: flex-start; gap: 6px; padding: 5px 4px;
  border-radius: 4px; cursor: pointer; line-height: 1.4;
  color: #c9d1d9; font-size: 11px;
}
.req-item:hover { background: #21262d; }
.req-item.off { color: #484f58; text-decoration: line-through; }
.req-item .bullet { color: #388bfd; flex-shrink: 0; margin-top: 1px; }
.req-item.off .bullet { color: #484f58; }
.kata-edit-btn { width: 100%; margin-top: 6px; }

/* ── History ── */
.hist-item {
  display: flex; gap: 8px; padding: 6px 2px;
  border-bottom: 1px solid #21262d; cursor: pointer;
  align-items: baseline;
}
.hist-item:hover { background: #21262d; }
.hist-hash { color: #58a6ff; font-size: 10px; flex-shrink: 0; }
.hist-msg  { color: #8b949e; font-size: 10px; flex: 1; }
.hist-time { color: #484f58; font-size: 9px; flex-shrink: 0; }
.hist-restore { font-size: 9px; color: #388bfd; display: none; }
.hist-item:hover .hist-restore { display: inline; }

/* ── Iterations ── */
.iter-card {
  border: 1px solid #21262d; border-radius: 6px; padding: 8px;
  margin-bottom: 6px;
}
.iter-head { display: flex; justify-content: space-between; margin-bottom: 4px; }
.iter-label { font-size: 11px; color: #c9d1d9; }
.badge {
  font-size: 9px; border-radius: 3px; padding: 1px 6px;
}
.badge.ok   { background: #1a3a22; color: #56d364; }
.badge.warn { background: #2d1d09; color: #e3b341; }
.badge.err  { background: #2d0f0f; color: #f85149; }
.badge.run  { background: #0d2137; color: #58a6ff; }
.finding {
  font-size: 10px; padding: 2px 0 2px 8px;
  border-left: 2px solid #30363d; color: #6e7681;
  margin: 2px 0;
}
.finding.warn { border-color: #d29922; color: #e3b341; }
.finding.ok   { border-color: #3fb950; color: #56d364; }
.finding.err  { border-color: #f85149; color: #ff7b72; }

/* ── Twin ── */
.twin-gate { margin-bottom: 8px; }
.twin-name { font-size: 10px; color: #8b949e; display: flex; justify-content: space-between; }
.twin-pct  { color: #58a6ff; }
.twin-bar-bg { height: 4px; background: #21262d; border-radius: 2px; margin-top: 3px; }
.twin-bar-fill { height: 4px; background: #1f6feb; border-radius: 2px; transition: width 0.4s; }

/* ── Run console ── */
#console-pane {
  background: #0d1117; border-top: 1px solid #30363d;
  font-family: 'SF Mono', monospace; font-size: 10px;
  height: 0; overflow: hidden; transition: height 0.2s;
  display: flex; flex-direction: column;
}
#console-pane.open { height: 180px; }
#console-header {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 10px; border-bottom: 1px solid #21262d;
  color: #8b949e; font-size: 10px; flex-shrink: 0;
}
#console-body { flex: 1; overflow-y: auto; padding: 6px 10px; }
#console-body::-webkit-scrollbar { width: 4px; }
#console-body::-webkit-scrollbar-thumb { background: #30363d; }
.log-out  { color: #c9d1d9; }
.log-err  { color: #ff7b72; }
.log-info { color: #58a6ff; }
.log-ok   { color: #56d364; }

/* ── Graph area ── */
#graph-wrap {
  flex: 1;
  position: relative;
  min-width: 0;
  display: flex;
  flex-direction: column;
}
#cy { flex: 1; }

/* ── Gate detail panel ── */
#detail {
  position: absolute; bottom: 16px; left: 16px;
  background: #161b22cc; backdrop-filter: blur(8px);
  border: 1px solid #30363d; border-radius: 8px;
  padding: 12px; width: 250px; font-size: 11px;
  display: none; z-index: 10;
}
#detail.visible { display: block; }
#detail h3 { color: #79c0ff; margin-bottom: 8px; font-size: 12px; }
.detail-row { display: flex; gap: 8px; margin-bottom: 4px; }
.detail-label { color: #6e7681; width: 58px; flex-shrink: 0; }
.detail-val { color: #c9d1d9; }
.chips { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 2px; }
.chip {
  font-size: 9px; background: #0d2137; border: 1px solid #1f6feb33;
  border-radius: 3px; padding: 2px 6px; color: #58a6ff;
}
.chip.out { background: #0f2a1a; border-color: #3fb95033; color: #56d364; }
#detail-actions { display: flex; gap: 4px; margin-top: 8px; }
#detail-actions .btn { flex: 1; font-size: 10px; }

/* ── Overlay (edit textarea) ── */
#overlay {
  position: fixed; inset: 0; background: #0008; display: none;
  align-items: center; justify-content: center; z-index: 100;
}
#overlay.open { display: flex; }
#overlay-box {
  background: #161b22; border: 1px solid #30363d; border-radius: 8px;
  padding: 16px; width: 600px; max-height: 80vh;
  display: flex; flex-direction: column; gap: 8px;
}
#overlay-box h3 { color: #79c0ff; }
#overlay-box textarea {
  flex: 1; min-height: 300px; background: #0d1117; color: #c9d1d9;
  border: 1px solid #30363d; border-radius: 4px; padding: 8px;
  font-family: inherit; font-size: 11px; resize: vertical;
}
#overlay-box .row { display: flex; gap: 6px; justify-content: flex-end; }
</style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
  <span class="title">da-diagram</span>
  <select id="flow-select"><option>loading…</option></select>
  <span class="spacer"></span>
  <span class="status" id="status-text">—</span>
  <button class="btn" onclick="showHistory()">⎇ history</button>
  <button class="btn green" onclick="runTwin()">▶ twin</button>
  <button class="btn primary" onclick="openRunPanel()">⟳ rerun</button>
  <button class="btn" id="console-toggle" onclick="toggleConsole()">⌨ console</button>
</div>

<!-- Main layout -->
<div id="layout">

  <!-- Left sidebar -->
  <div class="sidebar left">
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('left',this,'adrs')">ADRs</div>
      <div class="tab" onclick="switchTab('left',this,'kata')">Kata</div>
      <div class="tab" onclick="switchTab('left',this,'hist')">History</div>
    </div>
    <div id="panel-adrs" class="panel active">
      <div class="panel-body" id="adr-list"></div>
    </div>
    <div id="panel-kata" class="panel">
      <div class="panel-body">
        <div class="section-label">Toggle requirements</div>
        <div id="kata-reqs"></div>
        <button class="btn kata-edit-btn" onclick="editKata()">✎ edit kata</button>
      </div>
    </div>
    <div id="panel-hist" class="panel">
      <div class="panel-body" id="hist-list"></div>
    </div>
  </div>

  <!-- Graph -->
  <div id="graph-wrap">
    <div id="cy"></div>
    <div id="detail">
      <h3 id="d-name"></h3>
      <div class="detail-row"><span class="detail-label">kind</span><span class="detail-val" id="d-kind"></span></div>
      <div class="detail-row"><span class="detail-label">archetype</span><span class="detail-val" id="d-arch"></span></div>
      <div class="detail-row">
        <span class="detail-label">inputs</span>
        <div class="chips" id="d-in"></div>
      </div>
      <div class="detail-row">
        <span class="detail-label">outputs</span>
        <div class="chips" id="d-out"></div>
      </div>
      <div id="d-pending" style="display:none;color:#e3b341;font-size:10px;margin-top:4px">⚠ spec not yet generated</div>
      <div id="detail-actions">
        <button class="btn" onclick="rerunGate()">⟳ rerun gate</button>
        <button class="btn" onclick="document.getElementById('detail').classList.remove('visible')">✕</button>
      </div>
    </div>
  </div>

  <!-- Right sidebar -->
  <div class="sidebar right">
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('right',this,'iters')">Iterations</div>
      <div class="tab" onclick="switchTab('right',this,'twin-panel')">Twin</div>
    </div>
    <div id="panel-iters" class="panel active">
      <div class="panel-body" id="iters-list"></div>
    </div>
    <div id="panel-twin-panel" class="panel">
      <div class="panel-body">
        <div class="section-label">Fire rates (last twin run)</div>
        <div id="twin-rates"></div>
        <div class="section-label" style="margin-top:12px">Run options</div>
        <div style="margin-top:4px;display:flex;gap:6px">
          <input id="twin-runs" type="number" value="1000" style="width:70px;background:#21262d;border:1px solid #30363d;color:#c9d1d9;border-radius:4px;padding:3px 6px;font-family:inherit;font-size:11px">
          <button class="btn green" style="flex:1" onclick="runTwin()">▶ run twin</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Console pane -->
<div id="console-pane">
  <div id="console-header">
    <span>console</span>
    <span id="run-cmd" style="flex:1;color:#484f58"></span>
    <button class="btn danger" id="kill-btn" style="display:none;padding:2px 8px;font-size:9px" onclick="killRun()">■ kill</button>
    <button class="btn" style="padding:2px 8px;font-size:9px" onclick="clearConsole()">clear</button>
  </div>
  <div id="console-body"></div>
</div>

<!-- Kata edit overlay -->
<div id="overlay">
  <div id="overlay-box">
    <h3>Edit kata</h3>
    <textarea id="overlay-ta"></textarea>
    <div class="row">
      <button class="btn" onclick="closeOverlay()">Cancel</button>
      <button class="btn primary" onclick="saveKata()">Save</button>
      <button class="btn green" onclick="saveAndRun()">Save + rerun</button>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let cy = null;
let currentFlow = null;
let flowData = null;
let adrs = [];
let selectedGate = null;
let ws = null;
let twinResults = {};

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
  // Load available flows
  const flows = await fetch('/api/flows').then(r => r.json()).catch(() => []);
  const sel = document.getElementById('flow-select');
  sel.innerHTML = flows.map(f => `<option value="${f}">${f}</option>`).join('');
  sel.addEventListener('change', () => loadFlow(sel.value));

  // Load ADRs
  await loadADRs();

  // Init Cytoscape
  cy = cytoscape({
    container: document.getElementById('cy'),
    style: cytoscapeStyle(),
    layout: { name: 'preset' },
    wheelSensitivity: 0.3,
  });

  cy.on('tap', 'node[type="gate"]', e => showDetail(e.target.data()));
  cy.on('tap', e => { if (e.target === cy) hideDetail(); });

  // WebSocket
  connectWS();

  // Load first flow
  if (flows.length > 0) {
    await loadFlow(flows[0]);
    loadHistory(flows[0]);
  }
}

// ── WebSocket ─────────────────────────────────────────────────────────────────

function connectWS() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'start') {
      document.getElementById('run-cmd').textContent = msg.cmd;
      document.getElementById('kill-btn').style.display = 'inline-block';
      openConsole();
      log(`▶ ${msg.cmd}`, 'info');
    }
    if (msg.type === 'stdout') logText(msg.text, 'out');
    if (msg.type === 'stderr') logText(msg.text, 'err');
    if (msg.type === 'done') {
      document.getElementById('kill-btn').style.display = 'none';
      log(`■ exit ${msg.code}`, msg.code === 0 ? 'ok' : 'err');
      // Reload flow data after run
      setTimeout(() => loadFlow(currentFlow), 500);
    }
    if (msg.type === 'file_changed') {
      setStatus('↻ files changed', '#e3b341');
      setTimeout(() => loadFlow(currentFlow), 200);
    }
  };
  ws.onclose = () => setTimeout(connectWS, 2000);
}

// ── Flow loading ──────────────────────────────────────────────────────────────

async function loadFlow(name) {
  currentFlow = name;
  setStatus('loading…', '#6e7681');

  flowData = await fetch(`/api/flow/${name}`).then(r => r.json()).catch(() => null);
  if (!flowData) { setStatus('error loading flow', '#f85149'); return; }

  renderGraph(flowData);
  renderIterations(flowData.diary);
  renderKata(flowData.kata);
  highlightADRGates();
  setStatus(`${name} · ${(flowData.graph.gates || []).length} gates`, '#56d364');
}

// ── Graph rendering ───────────────────────────────────────────────────────────

function renderGraph(data) {
  const { graph, gateSpecs } = data;
  const elements = [];

  // Gate nodes
  for (const g of (graph.gates || [])) {
    const spec = gateSpecs[g.name] || {};
    const adrLinked = adrs.some(a => a.gateRefs.includes(g.name));
    elements.push({
      data: {
        id: g.name,
        label: g.name,
        type: 'gate',
        kind: spec.kind || 'gate',
        archetype: g.archetype || '',
        inputs: spec.inputs || [],
        outputs: spec.outputs || [],
        pending: spec.pending || false,
        adrLinked,
      }
    });
  }

  // Synapse edges
  const seen = new Set();
  for (const c of (graph.connections || [])) {
    // Only draw edges between gates in the graph
    const fromGate = (graph.gates || []).find(g => g.name === c.from);
    const toGate   = (graph.gates || []).find(g => g.name === c.to);
    if (!fromGate || !toGate) continue;
    const key = `${c.from}→${c.to}→${c.pulse_type}`;
    if (seen.has(key)) continue;
    seen.add(key);
    elements.push({
      data: {
        id: key,
        source: c.from,
        target: c.to,
        label: c.pulse_type,
        type: 'synapse',
      }
    });
  }

  cy.elements().remove();
  cy.add(elements);
  runLayout();
}

function runLayout() {
  // Use dagre if available, else breadthfirst
  const layoutName = typeof dagre !== 'undefined' ? 'dagre' : 'breadthfirst';
  cy.layout({
    name: layoutName,
    rankDir: 'TB',
    nodeSep: 40,
    rankSep: 60,
    padding: 30,
    animate: true,
    animationDuration: 300,
  }).run();
}

function cytoscapeStyle() {
  const kindColor = {
    sentinel: { bg: '#0d419d22', border: '#388bfd', text: '#79c0ff' },
    sync:     { bg: '#6e000022', border: '#f85149', text: '#ff7b72' },
    gate:     { bg: '#16222a',   border: '#30363d', text: '#c9d1d9' },
  };

  return [
    {
      selector: 'node[type="gate"]',
      style: {
        'label': 'data(label)',
        'text-valign': 'center',
        'text-halign': 'center',
        'font-family': 'SF Mono, Fira Code, monospace',
        'font-size': '9px',
        'color': '#c9d1d9',
        'background-color': '#16222a',
        'border-width': '1.5px',
        'border-color': '#30363d',
        'width': 'label',
        'height': 'label',
        'padding': '10px',
        'shape': 'roundrectangle',
        'text-wrap': 'wrap',
        'text-max-width': '120px',
      }
    },
    {
      selector: 'node[type="gate"][kind="sentinel"]',
      style: { 'background-color': '#0d2a5a', 'border-color': '#388bfd', 'color': '#79c0ff' }
    },
    {
      selector: 'node[type="gate"][kind="sync"]',
      style: { 'background-color': '#3a0a0a', 'border-color': '#f85149', 'color': '#ff7b72' }
    },
    {
      // guard gates = sentinel with "guard" in name
      selector: 'node[type="gate"][kind="sentinel"]',
      style: {} // base sentinel style
    },
    {
      selector: 'node[type="gate"][pending="1"], node[type="gate"][pending=true]',
      style: { 'border-style': 'dashed', 'opacity': 0.6 }
    },
    {
      selector: 'node[type="gate"][adrLinked="1"], node[type="gate"][adrLinked=true]',
      style: { 'border-width': '2.5px' }
    },
    {
      selector: 'node:selected',
      style: { 'border-color': 'white', 'border-width': '2.5px' }
    },
    {
      selector: 'node.highlighted',
      style: { 'border-color': '#f0883e', 'border-width': '2.5px',
                'background-color': '#3a1a00' }
    },
    {
      selector: 'edge[type="synapse"]',
      style: {
        'label': 'data(label)',
        'font-size': '7px',
        'font-family': 'SF Mono, Fira Code, monospace',
        'color': '#484f58',
        'text-rotation': 'autorotate',
        'curve-style': 'bezier',
        'target-arrow-shape': 'triangle',
        'target-arrow-color': '#30363d',
        'line-color': '#30363d',
        'arrow-scale': 0.7,
        'text-background-color': '#0d1117',
        'text-background-opacity': 1,
        'text-background-padding': '2px',
      }
    },
    {
      selector: 'edge.highlighted',
      style: { 'line-color': '#f0883e', 'target-arrow-color': '#f0883e', 'color': '#f0883e' }
    },
  ];
}

// ── ADR rendering ─────────────────────────────────────────────────────────────

async function loadADRs() {
  adrs = await fetch('/api/adrs').then(r => r.json()).catch(() => []);
  renderADRs();
}

function renderADRs() {
  const el = document.getElementById('adr-list');
  if (!adrs.length) { el.innerHTML = '<div style="color:#484f58;padding:8px;font-size:10px">No ADRs found</div>'; return; }

  el.innerHTML = adrs.map((a, i) => `
    <div class="adr-card ${a.status !== 'active' ? 'disabled-adr' : ''}" id="adr-card-${i}"
         onclick="highlightADR(${i})">
      <div class="adr-id">${a.name} · ${a.status}</div>
      <div class="adr-title">${a.title}</div>
      <div class="toggle ${a.status !== 'active' ? 'off' : ''}"
           onclick="event.stopPropagation();toggleADR(${i},this)"
           title="Toggle ADR active"></div>
      ${a.gateRefs.length ? `<div class="adr-gates">${a.gateRefs.map(g => `<span class="tag">${g}</span>`).join('')}</div>` : ''}
    </div>
  `).join('');
}

function highlightADR(idx) {
  const adr = adrs[idx];
  // Clear all highlights
  cy.nodes().removeClass('highlighted');
  cy.edges().removeClass('highlighted');
  document.querySelectorAll('.adr-card').forEach(c => c.classList.remove('highlighted'));
  document.getElementById(`adr-card-${idx}`).classList.add('highlighted');

  // Highlight mentioned gates
  const refs = new Set(adr.gateRefs);
  cy.nodes().forEach(n => {
    if (refs.has(n.data('label'))) n.addClass('highlighted');
  });
}

function toggleADR(idx, toggleEl) {
  fetch(`/api/adrs/${adrs[idx].name}/toggle`, { method: 'POST' })
    .then(r => r.json())
    .then(d => {
      toggleEl.classList.toggle('off');
      document.getElementById(`adr-card-${idx}`).classList.toggle('disabled-adr');
    });
}

function highlightADRGates() {
  cy.nodes().forEach(n => {
    const linked = adrs.some(a => a.gateRefs.includes(n.data('label')));
    n.data('adrLinked', linked);
  });
}

// ── Kata rendering ────────────────────────────────────────────────────────────

function renderKata(text) {
  const el = document.getElementById('kata-reqs');
  if (!text) { el.innerHTML = '<div style="color:#484f58;font-size:10px">No kata file found</div>'; return; }

  const lines = text.split('\n')
    .filter(l => l.trim().startsWith('-') || l.trim().startsWith('*'))
    .map(l => l.replace(/^[\s\-\*]+/, '').trim())
    .filter(Boolean);

  el.innerHTML = lines.map((l, i) => `
    <div class="req-item" id="req-${i}" onclick="toggleReq(${i})">
      <span class="bullet">▸</span>
      <span>${l}</span>
    </div>
  `).join('');
}

function toggleReq(i) {
  document.getElementById(`req-${i}`).classList.toggle('off');
}

function editKata() {
  document.getElementById('overlay-ta').value = flowData?.kata || '';
  document.getElementById('overlay').classList.add('open');
}

async function saveKata() {
  const text = document.getElementById('overlay-ta').value;
  await fetch(`/api/kata/${currentFlow}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text }),
  });
  flowData.kata = text;
  renderKata(text);
  closeOverlay();
}

async function saveAndRun() {
  await saveKata();
  openRunPanel();
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
}

// ── Iteration / diary rendering ───────────────────────────────────────────────

function renderIterations(sections) {
  const el = document.getElementById('iters-list');
  if (!sections || !sections.length) {
    el.innerHTML = '<div style="color:#484f58;font-size:10px;padding:4px">No diary yet</div>';
    return;
  }

  el.innerHTML = sections.map(s => {
    const isConverged = s.lines.some(l => l.includes('converged'));
    const isIncomplete = s.lines.some(l => l.includes('kata_incomplete') || l.includes('incomplete'));
    const badge = isConverged ? 'ok' : isIncomplete ? 'err' : 'warn';
    const badgeText = isConverged ? 'converged' : isIncomplete ? 'incomplete' : 'in-progress';

    const findings = s.lines
      .filter(l => l.trim() && !l.startsWith('gates_') && !l.startsWith('status:') && !l.startsWith('gaps_'))
      .slice(0, 5)
      .map(l => {
        const cls = l.includes('synthesized') || l.includes('flow:') ? 'ok'
                  : l.includes('discarded') || l.includes('error') ? 'err'
                  : 'warn';
        return `<div class="finding ${cls}">${l.trim()}</div>`;
      }).join('');

    return `
      <div class="iter-card">
        <div class="iter-head">
          <span class="iter-label">${s.header}</span>
          <span class="badge ${badge}">${badgeText}</span>
        </div>
        ${findings}
      </div>
    `;
  }).join('');
}

// ── History ───────────────────────────────────────────────────────────────────

async function loadHistory(name) {
  const hist = await fetch(`/api/history/${name}`).then(r => r.json()).catch(() => []);
  const el = document.getElementById('hist-list');
  if (!hist.length) {
    el.innerHTML = '<div style="color:#484f58;font-size:10px;padding:4px">No git history found</div>';
    return;
  }
  el.innerHTML = hist.map(h => `
    <div class="hist-item" onclick="restoreVersion('${h.hash}')">
      <span class="hist-hash">${h.hash}</span>
      <span class="hist-msg">${h.msg}</span>
      <span class="hist-time">${h.when}</span>
    </div>
  `).join('');
}

function showHistory() {
  switchTab('left', document.querySelectorAll('.sidebar.left .tab')[2], 'hist');
}

async function restoreVersion(hash) {
  if (!confirm(`Restore graph.json to ${hash}?`)) return;
  const data = await fetch(`/api/history/${currentFlow}/${hash}`).then(r => r.json()).catch(() => null);
  if (!data) { alert('Could not load revision'); return; }
  log(`Restored graph to ${hash} (in memory only — rerun to apply)`, 'info');
  // Show the restored graph visually
  flowData.graph = data;
  renderGraph({ graph: data, gateSpecs: flowData.gateSpecs });
}

// ── Gate detail ───────────────────────────────────────────────────────────────

function showDetail(data) {
  selectedGate = data;
  document.getElementById('d-name').textContent = data.label;
  document.getElementById('d-kind').textContent = data.kind;
  document.getElementById('d-arch').textContent = data.archetype;
  document.getElementById('d-in').innerHTML = (data.inputs || []).map(f =>
    `<span class="chip">${f}</span>`).join('') || '<span style="color:#484f58">—</span>';
  document.getElementById('d-out').innerHTML = (data.outputs || []).map(f =>
    `<span class="chip out">${f}</span>`).join('') || '<span style="color:#484f58">—</span>';
  document.getElementById('d-pending').style.display = data.pending ? 'block' : 'none';
  document.getElementById('detail').classList.add('visible');

  // Highlight connected edges
  cy.edges().removeClass('highlighted');
  cy.edges().filter(e => e.data('source') === data.id || e.data('target') === data.id)
    .addClass('highlighted');
}

function hideDetail() {
  document.getElementById('detail').classList.remove('visible');
  cy.edges().removeClass('highlighted');
  selectedGate = null;
}

function rerunGate() {
  if (!selectedGate) return;
  // Delete spec cache then full rerun
  log(`Rerunning gate: ${selectedGate.label}`, 'info');
  openRunPanel();
}

// ── Run panel ─────────────────────────────────────────────────────────────────

function openRunPanel() {
  if (!ws || ws.readyState !== 1) { log('WebSocket not connected', 'err'); return; }
  openConsole();
  ws.send(JSON.stringify({
    type: 'run',
    flow: currentFlow,
    backend: 'ollama',
    adrs: 'adrs',
    evalScript: '../tools/opis-eval/eval.py',
    loopMax: 3,
  }));
}

function killRun() {
  ws?.send(JSON.stringify({ type: 'kill' }));
}

function runTwin() {
  if (!ws || ws.readyState !== 1) { log('WebSocket not connected', 'err'); return; }
  openConsole();
  const runs = document.getElementById('twin-runs').value || 1000;
  // Find the composed spec path or use temp
  ws.send(JSON.stringify({
    type: 'run',
    flow: currentFlow,
    backend: 'ollama',
    extraArgs: [], // TODO: twin run command
  }));
  log('Twin run: use da-twin directly for now. Wiring in next iteration.', 'info');
}

// ── Console ───────────────────────────────────────────────────────────────────

function openConsole() {
  document.getElementById('console-pane').classList.add('open');
}

function toggleConsole() {
  document.getElementById('console-pane').classList.toggle('open');
}

function clearConsole() {
  document.getElementById('console-body').innerHTML = '';
}

function log(msg, cls = 'out') {
  const el = document.getElementById('console-body');
  const line = document.createElement('div');
  line.className = `log-${cls}`;
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function logText(text, cls) {
  text.split('\n').filter(Boolean).forEach(l => log(l, cls));
}

// ── Tabs ──────────────────────────────────────────────────────────────────────

function switchTab(side, el, panelId) {
  const sidebar = el.closest('.sidebar');
  sidebar.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  sidebar.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(`panel-${panelId}`).classList.add('active');
}

// ── Status ────────────────────────────────────────────────────────────────────

function setStatus(text, color = '#c9d1d9') {
  const el = document.getElementById('status-text');
  el.textContent = text;
  el.style.color = color;
}

// ── Boot ──────────────────────────────────────────────────────────────────────

// Load cytoscape-dagre inline (CDN doesn't have it, so we install as layout)
// Fallback: if dagre is not available, use breadthfirst
function registerDagreLayout() {
  if (typeof dagre === 'undefined') return;
  // minimal cytoscape-dagre registration
  cytoscape('layout', 'dagre', function(options) {
    this._private = {};
    var cy = options.cy, eles = options.eles;
    this.run = function() {
      var g = new dagre.graphlib.Graph({ multigraph: true });
      var opts = { rankdir: options.rankDir || 'TB',
                   nodesep: options.nodeSep || 40,
                   ranksep: options.rankSep || 60 };
      g.setGraph(opts);
      g.setDefaultEdgeLabel(() => ({}));

      var nodes = eles.nodes().not(':parent');
      nodes.forEach(n => {
        var bb = n.boundingBox();
        g.setNode(n.id(), { width: Math.max(bb.w, 100), height: Math.max(bb.h, 36) });
      });
      eles.edges().forEach(e => {
        g.setEdge(e.data('source'), e.data('target'), {}, e.id());
      });
      dagre.layout(g);

      nodes.forEach(n => {
        var dNode = g.node(n.id());
        if (dNode) n.position({ x: dNode.x, y: dNode.y });
      });

      if (options.animate) {
        cy.animate({ fit: { eles, padding: options.padding || 30 } },
                   { duration: options.animationDuration || 300 });
      } else {
        cy.fit(eles, options.padding || 30);
      }
      return this;
    };
    return this;
  });
}

registerDagreLayout();
init();
</script>
